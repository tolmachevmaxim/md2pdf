description = "Convert a Markdown file into a PDF using the installed md-to-pdf extension."

prompt = """
Convert the requested Markdown file into a PDF using the installed md-to-pdf extension at `~/.gemini/extensions/md-to-pdf`.

Workflow:
1. If `~/.gemini/extensions/md-to-pdf/.venv` is missing, run `python ~/.gemini/extensions/md-to-pdf/scripts/bootstrap.py`.
2. Convert with `python ~/.gemini/extensions/md-to-pdf/scripts/md2pdf.py` using `--renderer cmarkgfm` on Windows/Linux.
3. Use `--renderer qlmarkdown` only on macOS with QLMarkdown installed.
4. Verify the output PDF exists and has non-zero size before reporting success.

User request:
"""
